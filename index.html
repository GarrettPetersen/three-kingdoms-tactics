<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Three Kingdoms: Stratagem</title>
    <meta name="description" content="A pixel tactics game inspired by Romance of the Three Kingdoms.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Three Kingdoms: Stratagem">
    <meta property="og:description" content="A pixel tactics game inspired by Romance of the Three Kingdoms.">
    <meta property="og:image" content="/assets/misc/social_share_en.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Three Kingdoms: Stratagem">
    <meta name="twitter:description" content="A pixel tactics game inspired by Romance of the Three Kingdoms.">
    <meta name="twitter:image" content="/assets/misc/social_share_en.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="boot-loader" role="status" aria-live="polite" aria-label="Loading Three Kingdoms: Stratagem">
            <div class="boot-loader__panel">
                <div class="boot-loader__title-wrap">
                    <img
                        class="boot-loader__title"
                        src="assets/misc/three_kingdoms_stratagem_title_scaled.png"
                        alt="Three Kingdoms: Stratagem"
                        width="256"
                        height="89"
                    >
                </div>
                <div class="boot-loader__spinner" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <button
            id="web-fullscreen-toggle"
            class="web-fullscreen-toggle"
            type="button"
            aria-label="Enter fullscreen"
            title="Enter fullscreen"
            hidden
        >
            <span class="web-fullscreen-toggle__icon" aria-hidden="true"></span>
        </button>
        <button
            id="mobile-cheat-keyboard-toggle"
            class="mobile-cheat-keyboard-toggle"
            type="button"
            aria-label="Open keyboard"
            title="Keyboard"
            hidden
        >
            <span class="mobile-cheat-keyboard-toggle__glyph" aria-hidden="true"></span>
        </button>
        <input
            id="mobile-cheat-keyboard-input"
            class="mobile-cheat-keyboard-input"
            type="text"
            autocomplete="off"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            inputmode="text"
            aria-label="Cheat code input"
        >
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
