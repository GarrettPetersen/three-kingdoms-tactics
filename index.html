<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Three Kingdoms: Stratagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="boot-loader" role="status" aria-live="polite" aria-label="Loading Three Kingdoms: Stratagem">
            <div class="boot-loader__panel">
                <div class="boot-loader__title-wrap">
                    <img
                        class="boot-loader__title"
                        src="assets/misc/three_kingdoms_stratagem_title_scaled.png"
                        alt="Three Kingdoms: Stratagem"
                        width="256"
                        height="89"
                    >
                </div>
                <div class="boot-loader__spinner" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
